name: Notify Subscribers

on:
  push:
    branches: [main]
    paths:
      - 'data/writings.json'

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Send new writing email
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          BREVO_SENDER_EMAIL: ${{ secrets.BREVO_SENDER_EMAIL }}
        run: |
          python3 << 'EOF'
          import json, re, os, urllib.request, urllib.error

          # ── Load writings ──────────────────────────────────────
          with open('data/writings.json') as f:
              data = json.load(f)

          writings = sorted(data['writings'], key=lambda w: w['dateISO'], reverse=True)
          w = writings[0]

          # ── Build excerpt ──────────────────────────────────────
          content = w['content']
          plain = re.sub(r'<[^>]+>', '', content)
          plain = re.sub(r'#{1,6}\s+', '', plain)
          plain = re.sub(r'\*\*([^*]+)\*\*', r'\1', plain)
          plain = re.sub(r'\*([^*]+)\*', r'\1', plain)
          plain = re.sub(r'^>\s+', '', plain, flags=re.MULTILINE)
          plain = re.sub(r'\[([^\]]+)\]\([^)]+\)', r'\1', plain)
          plain = plain.strip()
          first_para = plain.split('\n\n')[0].strip()
          excerpt = (first_para[:280].rsplit(' ', 1)[0] + '…') if len(first_para) > 280 else first_para

          slug        = w['slug']
          title       = w['title']
          date        = w['date']
          scripture   = w['scriptureText']
          ref         = w['scriptureRef']
          site_url    = 'https://averyd308.github.io/faith-writings'
          writing_url = f'{site_url}/writing.html?slug={slug}'

          # ── HTML email ─────────────────────────────────────────
          html = f"""<!DOCTYPE html>
          <html lang="en">
          <head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"></head>
          <body style="margin:0;padding:0;background:#faf7f0;font-family:Georgia,serif;">
            <table width="100%" cellpadding="0" cellspacing="0" style="background:#faf7f0;padding:32px 16px;">
              <tr><td align="center">
                <table width="100%" cellpadding="0" cellspacing="0" style="max-width:580px;">

                  <!-- Header -->
                  <tr><td style="background:linear-gradient(160deg,#3d1219,#5c1e28,#7a2d3a);padding:32px 24px;text-align:center;border-bottom:3px solid #b8963e;">
                    <div style="font-size:28px;color:rgba(212,176,96,0.85);margin-bottom:8px;">✝</div>
                    <h1 style="margin:0;font-family:Georgia,serif;font-size:26px;font-weight:700;color:#fffdf8;letter-spacing:2px;">In His Word</h1>
                    <p style="margin:6px 0 0;font-style:italic;color:#d4b060;font-size:14px;letter-spacing:1px;">Daily reflections on Scripture</p>
                  </td></tr>

                  <!-- Date -->
                  <tr><td style="background:#fffdf8;padding:24px 32px 0;text-align:center;">
                    <p style="margin:0;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#8a7a6a;">{date}</p>
                  </td></tr>

                  <!-- Title -->
                  <tr><td style="background:#fffdf8;padding:12px 32px 20px;text-align:center;">
                    <h2 style="margin:0;font-family:Georgia,serif;font-size:22px;font-weight:700;color:#5c1e28;line-height:1.3;">{title}</h2>
                  </td></tr>

                  <!-- Scripture -->
                  <tr><td style="background:#fffdf8;padding:0 32px 24px;">
                    <table width="100%" cellpadding="0" cellspacing="0">
                      <tr><td style="background:rgba(240,224,176,0.3);border-left:3px solid #b8963e;padding:14px 18px;border-radius:0 4px 4px 0;">
                        <p style="margin:0;font-style:italic;color:#2a2018;font-size:16px;line-height:1.6;">&ldquo;{scripture}&rdquo;</p>
                        <p style="margin:6px 0 0;font-size:13px;color:#5a4a3a;text-align:right;">— {ref}</p>
                      </td></tr>
                    </table>
                  </td></tr>

                  <!-- Divider -->
                  <tr><td style="background:#fffdf8;padding:0 32px;text-align:center;">
                    <p style="color:#b8963e;font-size:14px;opacity:0.7;">✦ ✦ ✦</p>
                  </td></tr>

                  <!-- Excerpt -->
                  <tr><td style="background:#fffdf8;padding:0 32px 28px;">
                    <p style="margin:0;font-size:16px;line-height:1.8;color:#2a2018;">{excerpt}</p>
                  </td></tr>

                  <!-- Button -->
                  <tr><td style="background:#fffdf8;padding:0 32px 36px;text-align:center;">
                    <a href="{writing_url}" style="display:inline-block;background:#5c1e28;color:#fffdf8;text-decoration:none;font-family:Georgia,serif;font-size:15px;font-weight:600;letter-spacing:1px;padding:12px 32px;border-radius:4px;">Read the Full Writing &rarr;</a>
                  </td></tr>

                  <!-- Footer -->
                  <tr><td style="background:#3d1219;padding:20px 24px;text-align:center;border-top:2px solid #b8963e;">
                    <p style="margin:0;color:rgba(255,253,248,0.6);font-size:12px;">In His Word &nbsp;&middot;&nbsp; Sharing Scripture freely</p>
                    <p style="margin:6px 0 0;color:rgba(255,253,248,0.35);font-size:11px;font-style:italic;">&ldquo;For the word of God is living and active.&rdquo; — Hebrews 4:12</p>
                    <p style="margin:10px 0 0;font-size:11px;color:rgba(255,253,248,0.4);">
                      <a href="{{{{ unsubscribe }}}}" style="color:rgba(212,176,96,0.6);text-decoration:underline;">Unsubscribe</a>
                    </p>
                  </td></tr>

                </table>
              </td></tr>
            </table>
          </body>
          </html>"""

          # ── Create Brevo campaign ──────────────────────────────
          api_key      = os.environ['BREVO_API_KEY']
          sender_email = os.environ['BREVO_SENDER_EMAIL']

          campaign_payload = json.dumps({
              "name":        f"New Writing: {title} ({date})",
              "subject":     f"New Writing: {title} — In His Word",
              "sender":      {"name": "In His Word", "email": sender_email},
              "htmlContent": html,
              "recipients":  {"listIds": [2]}
          }).encode()

          req = urllib.request.Request(
              'https://api.brevo.com/v3/emailCampaigns',
              data=campaign_payload,
              headers={
                  'api-key':      api_key,
                  'Content-Type': 'application/json',
                  'Accept':       'application/json'
              },
              method='POST'
          )

          with urllib.request.urlopen(req) as resp:
              campaign = json.loads(resp.read())

          campaign_id = campaign['id']
          print(f"Campaign created: ID {campaign_id}")

          # ── Send immediately ───────────────────────────────────
          send_req = urllib.request.Request(
              f'https://api.brevo.com/v3/emailCampaigns/{campaign_id}/sendNow',
              data=b'',
              headers={'api-key': api_key, 'Content-Type': 'application/json'},
              method='POST'
          )

          try:
              with urllib.request.urlopen(send_req):
                  pass
              print(f"Email sent to subscribers for: {title}")
          except urllib.error.HTTPError as e:
              print(f"Send error {e.code}: {e.read().decode()}")
              raise

          EOF
